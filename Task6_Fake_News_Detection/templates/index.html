<!DOCTYPE html>
<html>
<head>
    <title>AI Fake News Detection</title>
</head>
<body>

    <h1>AI Fake News Detection System</h1>

    <form method="POST">

        <textarea
            name="news"
            rows="6"
            cols="60"
            placeholder="Enter News Here">
        </textarea>

        <br><br>

        <button type="submit">
            Check News
        </button>

    </form>

    <h2>{{ prediction }}</h2>

</body>
</html>
