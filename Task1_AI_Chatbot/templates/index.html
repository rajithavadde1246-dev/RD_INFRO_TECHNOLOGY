<!DOCTYPE html>
<html>

<head>

    <title>AI Customer Support Chatbot</title>

    <style>

        body{
            background-color:#f2f2f2;
            font-family:Arial;
            text-align:center;
            margin-top:50px;
        }

        .chat-container{
            width:400px;
            background:white;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px;
            background-color:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

        #reply{
            margin-top:20px;
            font-size:18px;
            color:green;
        }

    </style>

</head>

<body>

    <div class="chat-container">

        <h2>AI Customer Support Chatbot</h2>

        <input type="text" id="message" placeholder="Enter your message">

        <button onclick="sendMessage()">Send</button>

        <p id="reply"></p>

    </div>

    <script>

        function sendMessage(){

            let userMessage = document.getElementById("message").value;

            // FIX: encode message (important)
            fetch("/get?msg=" + encodeURIComponent(userMessage))

            .then(response => response.text())

            .then(data => {

                document.getElementById("reply").innerHTML = data;

            });

        }

    </script>

</body>

</html>
