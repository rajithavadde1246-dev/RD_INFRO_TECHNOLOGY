<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Surveillance System</title>
    
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            color: #00bac0;
            margin-bottom: 5px;
        }
        .header p {
            color: #aaa;
            margin-top: 0;
        }
        
        .video-container { 
            border: 4px solid #333; 
            border-radius: 12px; 
            display: inline-block; 
            padding: 10px; 
            background: #000;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        
        .analyze-button { 
            background-color: #00bac0; 
            color: white; 
            padding: 12px 24px; 
            font-size: 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-top: 25px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .analyze-button:hover { 
            background-color: #008fa1; 
        }
        
        .result-box { 
            margin-top: 25px; 
            font-size: 22px; 
            color: #ffcc00; 
            font-weight: bold;
            background-color: #1e1e1e;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #444;
            min-width: 300px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Task 2: Smart Security Surveillance</h1>
        <p>Real-Time YOLOv8 Detection & TensorFlow/Keras Object Analysis</p>
    </div>
    
    <div class="video-container">
        <img src="{{ url_for('video_feed') }}" width="640" height="480" alt="Live Camera Stream Feed">
    </div>
    
    <br>
    
    <button id="analyze-btn" class="analyze-button">📸 TensorFlow: Capture & Deep Analyze</button>
    
    <br>
    
    <div id="result-display" class="result-box" style="display: none;">
        </div>

    <script>
        document.getElementById('analyze-btn').addEventListener('click', function() {
            var resultBox = document.getElementById('result-display');
            
        
            resultBox.style.display = "inline-block";
            resultBox.innerHTML = "🔄 TensorFlow is analyzing the frame... Please wait...";
            resultBox.style.color = "#00bac0";
            
            
            fetch('/analyze_frame')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        resultBox.innerHTML = "❌ Error: Could not capture frame.";
                        resultBox.style.color = "#ff3333";
                    } else {
                        // TensorFlow 
                        resultBox.innerHTML = "🧠 TensorFlow Prediction: <br><span style='color: #ffcc00; font-size: 26px;'>" + data.label + "</span> (" + data.confidence + ")";
                    }
                })
                .catch(err => {
                    resultBox.innerHTML = "❌ Connection Error.";
                    resultBox.style.color = "#ff3333";
                });
        });
    </script>
</body>
</html>
